workflows:
  ios-signing-less:
    name: iOS Unsigned Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
    scripts:
      - name: Build Unsigned iOS App
        script: |
          echo "Building unsigned Xcode app..."
          xcodebuild \
            -project "Forma.xcodeproj" \
            -scheme "Forma" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            OBJROOT="$PWD/build" \
            SYMROOT="$PWD/build"
    artifacts:
      - build/Release-iphoneos/*.app

  ios-signed-ipa:
    name: iOS Signed IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.forma.app
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/Forma.xcodeproj"
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/Forma.xcodeproj" \
            --scheme "Forma"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
